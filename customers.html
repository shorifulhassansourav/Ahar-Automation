<!DOCTYPE html>
<html>
<head>

<title>Customers</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body>

<div class="container mt-5">

<h2>Add Customer</h2>

<form id="customerForm">

<input
class="form-control mb-3"
placeholder="Name"
id="name">

<input
class="form-control mb-3"
placeholder="Phone"
id="phone">

<input
class="form-control mb-3"
placeholder="Address"
id="address">

<input
class="form-control mb-3"
placeholder="Area"
id="area">

<input
class="form-control mb-3"
placeholder="Plan"
id="plan">

<button
class="btn btn-primary">
Save Customer
</button>

</form>

</div>

<script src="js/customers.js"></script>

</body>
</html>
